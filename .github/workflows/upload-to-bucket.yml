name: Upload JSON to Bucket

on:
  workflow_run:
    workflows: ["Parse XLSX to JSON and commit"]
    types:
      - completed

  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload JSONs to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # Upload from json/latest/ directory, stripping version suffix
          for file in json/latest/*.json; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # Strip version suffix: combined_votes_peru_partidos_2026_v1.2.3.json -> combined_votes_peru_partidos_2026.json
              base_filename=$(echo "$filename" | sed -E 's/_v[0-9]+\.[0-9]+\.[0-9]+\.json/.json/')
              country_year=$(echo "$base_filename" | sed -E 's/combined_votes_([a-z]+)_[a-z]+_([0-9]+)\.json/\1_\2/')
              echo "Uploading $filename as $base_filename to elections/$country_year/"
              wrangler r2 object put "$R2_BUCKET/elections/$country_year/$base_filename" --file "$file" --remote
            fi
          done